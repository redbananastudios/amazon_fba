# Strategy: oa_csv
# Online-arbitrage full pipeline. Reads a third-party OA export
# (SellerAmp 2DSorter / Tactical Arbitrage / OAXray), filters
# exclusions, enriches each ASIN with Keepa market data, calculates
# fees + profit, decides SHORTLIST/REVIEW/REJECT, writes the verdict
# CSV.
#
# Run via:
#   export KEEPA_API_KEY=...
#   python -m fba_engine.strategies.runner \
#       --strategy fba_engine/strategies/oa_csv.yaml \
#       --context feed=selleramp \
#                 csv_path=fba_engine/data/strategies/oa_csv/selleramp/2dsorter-export.csv \
#                 run_dir=fba_engine/data/strategies/oa_csv/selleramp \
#                 timestamp=20260430_120000

name: oa_csv
description: >
  Online-arbitrage decision pipeline — read a third-party OA candidate
  CSV, filter exclusions, enrich with Keepa market data, decide
  SHORTLIST/REVIEW/REJECT per ASIN.

# `input.discover: true` — discovery step reads the OA CSV directly
# from `csv_path` config; the runner passes an empty df_in.
input:
  discover: true

steps:
  # Stage 01 — discover: parse the OA CSV via the named importer.
  # Emits canonical schema: asin, source, feed, retail_url, buy_cost
  # (renamed from importer-side `retail_cost_inc_vat` per PRD §6.4),
  # retail_name.
  - name: discover
    module: fba_engine.steps.oa_csv
    config:
      feed: "{feed}"
      csv_path: "{csv_path}"
      # exclusions_path is optional — defaults to
      # fba_engine/data/niches/exclusions.csv. Override for sandboxed
      # runs by passing `exclusions_path: "..."` in context.

  # Stage 03 — keepa_enrich: fetch market_price / sales_rank / etc.
  # per ASIN via the Keepa /product batch API. ASINs Keepa hasn't
  # tracked get None-filled market columns; calculate REJECTs them
  # downstream as "No valid market price".
  - name: keepa_enrich
    module: fba_engine.steps.keepa_enrich

  # Stage 04 — calculate: fees + conservative price + profit + risk
  # flags. Reads buy_cost (from discover) + market columns (from
  # keepa_enrich). REJECTs rows with no usable market price.
  - name: calculate
    module: fba_engine.steps.calculate

  # Stage 05 — decide: SHORTLIST / REVIEW / REJECT verdicts.
  - name: decide
    module: fba_engine.steps.decide

  # Stage 06 — candidate_score: 0-100 strength + HIGH/MEDIUM/LOW
  # data confidence. Pure additive; feeds validate_opportunity.
  - name: candidate_score
    module: fba_engine.steps.candidate_score

  # Stage 07 — validate_opportunity: BUY / SOURCE_ONLY / NEGOTIATE /
  # WATCH / KILL. Pure additive — never alters the decide-step
  # verdict. Operator-facing answer to "is this worth acting on now?".
  - name: validate_opportunity
    module: fba_engine.steps.validate_opportunity

output:
  csv: "{run_dir}/oa_decisions_{feed}_{timestamp}.csv"
