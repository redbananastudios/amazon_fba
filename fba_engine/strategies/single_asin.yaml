# Strategy: single_asin
# "Should I buy this ASIN?" — operator passes an ASIN (and optionally a
# buy_cost), the engine fetches market data via Keepa API, runs SP-API
# gating + economics + decision, and emits a verdict to stdout.
#
# Cost: 1 Keepa API call (~1 token at the cheapest tier with stats=90)
# + 1 SP-API preflight call (free under our seller-account quota).
#
# Run:
#   # Wholesale leads mode (buy_cost defaulted to 0 → emits max_buy_price)
#   python run.py --strategy single_asin --asin B0EXAMPLE12
#
#   # With operator's real cost (gets ROI verdicts)
#   python run.py --strategy single_asin --asin B0EXAMPLE12 --buy-cost 6.50

name: single_asin
description: >
  Single-ASIN verdict workflow. Builds a 1-row DataFrame from CLI
  args, enriches via Keepa (price history) + SP-API (gating /
  eligibility / hazmat / catalog brand), calculates economics
  (max_buy_price for wholesale flow, ROI for retail flow), decides,
  prints the verdict.

# `input.discover: true` — the discover step creates the DataFrame
# from CLI args; the runner passes an empty df_in.
input:
  discover: true

steps:
  # Stage 01 — discover: 1-row DataFrame seeded with ASIN + buy_cost.
  - name: discover
    module: fba_engine.steps.single_asin
    config:
      asin: "{asin}"
      buy_cost: "{buy_cost}"

  # Stage 02 — keepa_enrich: fetch per-ASIN market data via Keepa API.
  # Populates buy_box_price, buy_box_avg90, fba_seller_count,
  # sales_estimate, etc. — the canonical fields calculate.py reads.
  # Requires KEEPA_API_KEY env var.
  #
  # `with_offers: true` requests Keepa's live offer list (+4 tokens per
  # ASIN). Critical for single-ASIN verdicts: Keepa's `stats.current[18]`
  # (BUY_BOX) and `stats.current[10]` (NEW_FBA) return -1 sentinels for
  # many real-world ASINs even when active FBA offers exist. The offers
  # list is the authoritative source — without it the engine can't see
  # the actual market price and falls through to Amazon's offer (often
  # dormant inventory priced well above the real Buy Box).
  - name: keepa_enrich
    module: fba_engine.steps.keepa_enrich
    config:
      with_offers: true

  # Stage 03 — enrich: SP-API leads-mode preflight (restrictions /
  # FBA eligibility / catalog brand / catalog hazmat). Silently no-ops
  # when SP-API creds aren't set so the strategy is testable in dev
  # environments without creds.
  - name: enrich
    module: fba_engine.steps.enrich
    config:
      include: leads

  # Stage 04 — calculate: fees + conservative price + max_buy_price
  # (when buy_cost=0) or ROI (when buy_cost>0). Also fires the
  # BUY_BOX_ABOVE_AVG90 peak-buying flag when current is materially
  # above 90d avg.
  - name: calculate
    module: fba_engine.steps.calculate

  # Stage 05 — decide: SHORTLIST / REVIEW / REJECT verdict.
  # Single-ASIN mode is an on-demand operator query ("should I buy
  # THIS one ASIN?") rather than a portfolio-velocity gate, so the
  # default sales-volume floors don't apply — a profitable low-volume
  # niche listing should still get a verdict on its merits. Operator
  # who genuinely wants velocity gating can layer a recipe later.
  - name: decide
    module: fba_engine.steps.decide
    config:
      overrides:
        min_sales_review: 0
        min_sales_shortlist: 0

  # Stage 05.5 — keepa_browser_enrich: when a per-ASIN Keepa
  # Browser scrape exists at .cache/keepa_browser/<asin>.json,
  # merge the chart-quality signals (per-seller BB share with
  # FBA flag, precomputed 365d low / OOS %, real seller names).
  # Silent no-op when the cache is missing — operator can populate
  # it via Claude+MCP per docs/KEEPA_BROWSER_SCRAPE.md.
  #
  # Runs BEFORE candidate_score so the share-aware velocity
  # predictor sees the Browser data when it's there.
  - name: keepa_browser_enrich
    module: fba_engine.steps.keepa_browser_enrich

  # Stage 06 — candidate_score: 0-100 strength + HIGH/MEDIUM/LOW data
  # confidence. Pure additive; feeds validate_opportunity. Without
  # this, validate_opportunity would never see candidate_score and
  # would over-route rows to WATCH.
  - name: candidate_score
    module: fba_engine.steps.candidate_score

  # Stage 07 — validate_opportunity: BUY / SOURCE_ONLY / NEGOTIATE /
  # WATCH / KILL verdict. The "should I act on this now?" answer.
  # Pure additive — never changes the decide-step verdict.
  - name: validate_opportunity
    module: fba_engine.steps.validate_opportunity

  # Stage 08 — buy_plan: order qty / capital / payback / target buy
  # cost / negotiation gap. The single-ASIN printer renders the
  # block from these columns. Pure additive — appends 11 columns.
  - name: buy_plan
    module: fba_engine.steps.buy_plan
    config:
      order_mode: "{order_mode}"

output:
  csv: "{output_dir}/single_asin_{asin}_{timestamp}.csv"
