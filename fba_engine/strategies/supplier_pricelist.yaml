# Strategy: supplier_pricelist
# Composes the canonical engine's per-stage step modules into a single
# chain mirroring the legacy `sourcing_engine.main.run_pipeline`.
#
# Run via:
#   python -m fba_engine.strategies.runner \
#       --strategy fba_engine/strategies/supplier_pricelist.yaml \
#       --context supplier=connect-beauty \
#                 input_path=fba_engine/data/pricelists/connect-beauty/raw \
#                 market_data_path=fba_engine/data/pricelists/connect-beauty/raw/keepa.csv \
#                 run_dir=fba_engine/data/pricelists/connect-beauty/results/run \
#                 timestamp=20260429_120000 \
#                 supplier_label="Connect Beauty"
#
# Equivalent direct invocation: `python run.py --supplier connect-beauty`.
# The YAML form is preferred when chaining strategies (e.g. Cowork
# orchestration that wants to fan-out across multiple suppliers).

name: supplier_pricelist
description: >
  Canonical supplier-pricelist sourcing strategy: discover from a
  supplier adapter, resolve EAN→ASIN against Keepa, calculate fees +
  conservative price + profit, decide SHORTLIST/REVIEW/REJECT, enrich
  with SP-API preflight, and write CSV+XLSX+MD outputs.

# `input.discover: true` tells the runner the first step creates the
# DataFrame from supplier files (no input CSV to load).
input:
  discover: true

steps:
  # Stage 01 — discover (adapter ingest + normalise + case_detection).
  - name: discover
    module: fba_engine.steps.supplier_pricelist_discover
    config:
      supplier: "{supplier}"
      input_path: "{input_path}"

  # Stage 02 — resolve (EAN validation + Amazon market match).
  - name: resolve
    module: fba_engine.steps.resolve
    config:
      market_data_path: "{market_data_path}"

  # Stage 04 — calculate (fees + conservative price + profit + risk).
  - name: calculate
    module: fba_engine.steps.calculate

  # Stage 04.5 — candidate_score (data-driven 0-100 strength signal +
  # data-confidence label). Pure additive: appends 5 columns, does NOT
  # influence decide. See HANDOFF_candidate_validation.md WS3.
  - name: candidate_score
    module: fba_engine.steps.candidate_score

  # Stage 05 — decide (SHORTLIST / REVIEW / REJECT).
  - name: decide
    module: fba_engine.steps.decide

  # Stage 03 — enrich (SP-API preflight). Runs AFTER decide so we know
  # which rows are actionable. `survivors_only: true` filters to non-
  # REJECT rows before invoking the MCP — typical 5720-row ABGEE run
  # has 5700 REJECTs the SP-API doesn't need to touch (saves ~10 min).
  # Live BB price + offer counts populate live_* columns; the next
  # step bridges them into canonical names.
  - name: enrich
    module: fba_engine.steps.enrich
    config:
      enabled: true
      survivors_only: true

  # Stage 05.45 — merge_live_pricing. The SP-API enrich step above
  # already fetched live Buy Box price + offer counts via getItemOffersBatch,
  # but wrote them to `live_*` columns the engine doesn't read. This
  # step bridges them into the canonical columns (`buy_box_price`,
  # `fba_seller_count`, `amazon_status`) so the second-pass calculate
  # sees current data. Critical for niche listings where Keepa never
  # tracked BB — SP-API has it in real-time. Live wins over stale.
  - name: merge_live_pricing
    module: fba_engine.steps.merge_live_pricing

  # Stage 05.5 — keepa_enrich_survivors. The first-pass `resolve` step
  # reads market data from a static Keepa Browser CSV, typically weeks
  # old. After `decide` filters to a small set of survivors (non-REJECT
  # rows), refresh those rows with live Keepa per-ASIN data so the
  # analyst layer (validate_opportunity / buy_plan_html) sees the same
  # signals it would in the single_asin chain — current Buy Box,
  # bsr_slope_*, joiners_90d, buy_box_oos_pct_90, listing_age_days.
  # `with_offers: false` keeps per-product cost ~3 tokens so a typical
  # 5-50 survivor batch fits in the 100-token bucket without chunking.
  # REJECT rows pass through untouched.
  - name: keepa_enrich_survivors
    module: fba_engine.steps.keepa_enrich_survivors
    config:
      with_offers: false

  # Stage 05.6 — calculate (re-run on survivors). Recompute economics
  # against the refreshed Buy Box prices. `recalculate=true` clears
  # the stale decision on non-REJECT rows so the math runs again.
  - name: calculate
    module: fba_engine.steps.calculate
    config:
      recalculate: true

  # Stage 05.7 — decide (re-run on survivors). A SHORTLIST against
  # stale data may flip to REJECT once the live BB price erodes the
  # margin (this caught Schleich Sea Turtle, Ravensburger Colour
  # Blast, etc. in the 2026-05-03 abgee verdict-parity calibration).
  - name: decide
    module: fba_engine.steps.decide
    config:
      force: true

  # Stage 05.8 — candidate_score (re-run). Idempotent: reads the
  # refreshed market columns, overwrites the score / band /
  # data_confidence columns from the first pass.
  - name: candidate_score
    module: fba_engine.steps.candidate_score

  # Stage 05.85 — keepa_browser_enrich. Silent no-op when the per-ASIN
  # cache `.cache/keepa_browser/<asin>.json` is absent. When present,
  # merges chart-quality data (per-seller BB share, precomputed 365d
  # signals) — fills the gap Keepa-API cannot for niche listings.
  - name: keepa_browser_enrich
    module: fba_engine.steps.keepa_browser_enrich

  # Stage 05.9 — flag_browser_scrape_needed. For survivors that still
  # lack the historical Browser-only signals (per-seller share,
  # 90d BB drop, 365d floor, OOS pattern) AND have no cache file,
  # this step:
  #   1. Adds BROWSER_SCRAPE_NEEDED to risk_flags
  #   2. Lowers data_confidence to LOW (validator routes away from BUY)
  #   3. Writes <run_dir>/keepa_browser_scrape_needed.json — the
  #      manifest the operator scrapes via Claude+MCP, then re-runs.
  # No row should reach BUY without confirmed historical data.
  - name: flag_browser_scrape_needed
    module: fba_engine.steps.flag_browser_scrape_needed
    config:
      run_dir: "{run_dir}"

  # Stage 07 — validate_opportunity (BUY / SOURCE_ONLY / NEGOTIATE /
  # WATCH / KILL). Final operator-facing verdict on top of the
  # SHORTLIST/REVIEW/REJECT decision. Runs after enrich so it sees
  # restriction_status + fba_eligible from SP-API. Pure additive.
  - name: validate_opportunity
    module: fba_engine.steps.validate_opportunity

  # Stage 08 — buy_plan (order qty / capital / payback / target buy
  # cost / negotiation gap). Pure additive: appends 11 columns,
  # never alters the verdict. order_mode threads from --order-mode
  # CLI flag (default first-order; reorder for known-selling ASINs).
  - name: buy_plan
    module: fba_engine.steps.buy_plan
    config:
      order_mode: "{order_mode}"

  # Stage 06 — output (CSV + XLSX + MD writers).
  - name: output
    module: fba_engine.steps.supplier_pricelist_output
    config:
      run_dir: "{run_dir}"
      timestamp: "{timestamp}"
      supplier_label: "{supplier_label}"

  # Stage 09 — buy_plan_html (buyer report — JSON + HTML).
  # Pure additive: writes buyer_report_<ts>.{json,html} alongside
  # the existing CSV/XLSX/MD. Honours `buy_plan_html.enabled` config.
  - name: buy_plan_html
    module: fba_engine.steps.buy_plan_html
    config:
      run_dir: "{run_dir}"
      timestamp: "{timestamp}"
      strategy: supplier_pricelist
      supplier: "{supplier}"
