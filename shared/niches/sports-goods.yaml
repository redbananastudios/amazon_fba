    notes: search for UK trade contact
  - name: Talbot-Torro UK
    url: talbottorro.com
    type: trade
  - name: Yonex UK
    url: yonex.co.uk
    type: trade
    notes: trade enquiries
  - name: Wilson UK
    url: wilson.com/en-gb
    type: trade
  - name: Babolat UK
    url: babolat.com
    type: trade
  - name: Head UK
    url: head.com/en-GB
