niche_id: stationery
sheet_tab: Stationery

keepa_filters:
  bsr_min: 5000
  bsr_max: 50000
  velocity_min: 100
  root_category: Stationery & Office Supplies
  exclude_subcategory:
    - Printer Paper
    - Copy & Multipurpose Paper
    - Printer Ink Cartridges
    - Printer Toner Cartridges
    - Typewriter Ribbons

exclusion_keywords:
  heavy:
    [paper ream, ream, printer paper, copy paper, 500 sheets,
     large format, A0, A1, A2, plotter]

focus_products:
  good:
    - Premium pens and pen sets
    - Fountain pens
    - Mechanical pencils
    - Notebooks and journals
    - Planners and diaries
    - Bullet journals
    - Highlighter sets
    - Marker sets
    - Coloured pencil sets
    - Desk organisers and accessories
    - Washi tape sets
    - Sticky notes (premium branded)
    - Revision cards, index cards
    - Calligraphy sets
    - Watercolour sets and art supplies
    - Sketchbooks
    - Stationery gift sets
  avoid:
    - Paper reams
    - Printer consumables
    - Large format paper
    - Office furniture
    - Heavy filing equipment
    - Aerosol art supplies (spray fixatives, spray paint)

focus_brands:
  - Stabilo
  - Pilot
  - Pentel
  - Leuchtturm1917
  - Moleskine
  - Rhodia
  - Clairefontaine
  - Faber-Castell
  - Staedtler
  - Zebra
  - Uniball
  - Tombow
  - Caran d Ache
  - Daler-Rowney
  - Winsor and Newton
  - Arteza

